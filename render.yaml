services:
  - type: web
    name: opportunity-radar-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && pip install pydantic-settings
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./opportunity_radar.db
      - key: PYTHON_VERSION
        value: "3.11.0"
